services:
  # ============================================================
  # ИНФРАСТРУКТУРА
  # ============================================================
  postgres:
    image: postgres:18.3-alpine
    container_name: media-parser-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - media-parser-network

  redis:
    image: redis:8.6.1-alpine
    container_name: media-parser-redis
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - media-parser-network

  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: media-parser-rabbitmq
    ports:
      - "${RABBIT_PORT}:${RABBIT_PORT}"
      - "${RABBIT_UI_PORT}:${RABBIT_UI_PORT}"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - media-parser-network

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: media-parser-minio
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: minio server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - media-parser-network

  # ============================================================
  # BACKEND
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: media-parser-backend
    ports:
      - "${MEDIA_PARSER_PORT}:${MEDIA_PARSER_PORT}"
    environment:
      - SERVER_PORT=${MEDIA_PARSER_PORT}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - media-parser-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  media-parser-network:
    driver: bridge
